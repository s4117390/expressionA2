<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Field</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Intro screen -->
<div id="intro">
    <div class="intro-content">
        <p class="intro-eyebrow">an anti-war experience</p>
        <h1>THE LAST<br>FIELD</h1>
        <p class="intro-sub">Move through this world.<br>Watch what your presence does.</p>
        <button id="enterBtn">BEGIN</button>
    </div>
</div>

<!-- Main experience -->
<div id="app" class="hidden">

    <!-- Parallax scene: layered divs -->
    <div id="scene">
        <div class="layer" id="l-sky"></div>
        <div class="layer" id="l-bg"></div>
        <div class="layer" id="l-mid"></div>
        <div class="layer" id="l-ground"></div>
        <div class="layer" id="l-fg"></div>
        <!-- Interactive canvas sits on top of SVG layers -->
        <canvas id="interactCanvas"></canvas>
    </div>

    <!-- Narrative overlay -->
    <div id="narrative">
        <p id="narrativeText"></p>
    </div>

    <!-- Scene label -->
    <div id="sceneLabel"></div>

    <!-- Stat counter (scene 2) -->
    <div id="statBox" class="hidden">
        <div class="stat-num" id="caughtNum">0</div>
        <div class="stat-label">fragments held</div>
        <div class="stat-num" id="lostNum">0</div>
        <div class="stat-label">lost forever</div>
    </div>

    <!-- Bottom nav -->
    <div id="nav">
        <div id="dots">
            <span class="dot active" data-i="0"></span>
            <span class="dot-line"></span>
            <span class="dot" data-i="1"></span>
            <span class="dot-line"></span>
            <span class="dot" data-i="2"></span>
        </div>
        <button id="nextBtn">NEXT →</button>
    </div>

    <!-- Dark transition overlay -->
    <div id="veil"></div>

</div>

<!-- Custom cursor -->
<div id="cursor"></div>

<script src="audio.js"></script>
<script src="scenes.js"></script>
<script src="main.js"></script>
</body>
</html>
