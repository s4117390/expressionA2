<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes of Peace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Intro -->
<div id="intro">
    <div class="intro-inner">
        <p class="intro-eye">a space to rebuild</p>
        <h1>Echoes of Peace</h1>
        <p class="intro-sub">The war is over.<br>What you bring back is up to you.</p>
        <button id="enterBtn">BEGIN</button>
    </div>
</div>

<!-- Main -->
<div id="app" class="hidden">

    <!-- 视差场景层 -->
    <div id="scene">
        <div class="layer" id="l-sky"></div>
        <div class="layer" id="l-bg"></div>
        <div class="layer" id="l-mid"></div>
        <div class="layer" id="l-ground"></div>
        <div class="layer" id="l-fg"></div>
        <!-- Interaction Canva -->
        <canvas id="cvs"></canvas>
    </div>

    <!-- Selection Buttons(left) -->
    <div id="soundPanel">
        <div class="trigger"></div>
        <div class="panel-content">
            <p class="panel-label">what do you remember</p>
            <button class="sbtn" data-sound="chime">wind chime</button>
            <button class="sbtn" data-sound="rain">rain</button>
            <button class="sbtn" data-sound="bird">birdsong</button>
            <button class="sbtn" data-sound="bell">bell</button>
            <button class="sbtn" data-sound="wind">wind</button>
        </div>
        <span id="soundLabel">memory</span>
    </div>

    <!-- Selection Buttons(right) -->
    <div id="formPanel">
        <div class="trigger"></div>
        <div class="panel-content">
            <p class="panel-label">how does it grow</p>
            <button class="fbtn" data-form="flower">flower</button>
            <button class="fbtn" data-form="grass">grass</button>
            <button class="fbtn" data-form="tree">tree</button>
            <button class="fbtn" data-form="light">light</button>
            <button class="fbtn" data-form="water">water</button>
            <button class="fbtn" data-form="bird">bird</button>
        </div>
        <span id="formLabel">form</span>
    </div>

    <!-- interaction hint -->
    <div id="hint">choose a memory and a form, then place it</div>

    <!-- narrative overlay -->
    <div id="narrative"></div>

    <!-- cursor -->
    <div id="cursor"></div>

</div>

<script src="audio.js"></script>
<script src="scenes.js"></script>
<script src="main.js"></script>
</body>
</html>
